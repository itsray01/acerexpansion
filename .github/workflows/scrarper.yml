name: Multi-Portal Real Estate Scraper Test

on:
  schedule:
    # Triggers at 01:00 UTC (9:00 AM Singapore Time) every Monday, Wednesday, and Friday
    - cron: '0 1 * * 1,3,5'
  workflow_dispatch: # Enables the gray "Run workflow" button in the GitHub Actions UI for manual testing

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential permission to let the runner save and push seen_listings.json back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Test Scraper
        run: python test_portals.py

      - name: Commit State File (seen_listings.json)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update multi-portal seen listings ledger [skip ci]"
          file_pattern: seen_listings.json
