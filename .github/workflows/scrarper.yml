name: HDB Scraper Automation

# Triggers: Run automatically every day at 8 AM UTC (4 PM SG time) and manually via GitHub UI
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run HDB Scraper
        run: python test_hdb_only.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}

      - name: Commit and Push state file (if changed)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_hdb_listings.json || true
          git commit -m "chore: update active ledger" || true
          git push || true
