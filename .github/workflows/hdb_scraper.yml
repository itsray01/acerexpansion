name: HDB Bidding Bot

on:
  schedule:
    # 1:00 AM UTC translates to 9:00 AM Singapore Time (SGT)
    - cron: '16 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pandas playwright python-dotenv
          python -m playwright install chromium

      - name: Run HDB Bidding Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: python test_hdb_only.py

      - name: Commit Live Tenders and Ledger
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live_tenders.json || echo "No live tenders file generated"
          git add seen_hdb_listings.json || echo "No state file generated"
          git commit -m "Auto-update live HDB tenders and ledger" || exit 0
          git push
